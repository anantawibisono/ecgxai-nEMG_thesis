defaults:
  - data: emglab
  - model: simple_vae
  - trainer: default
  - logger: none
  - _self_

seed: 42
experiment_name: simple_vae_nemg

hydra:
  run:
    dir: outputs/${experiment_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${experiment_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}