defaults:
  - data: emglab
  - model: van_de_leur_model
  - trainer: default
  - logger: none
  - _self_

seed: 42
experiment_name: vandeleur_model_huber_loss

hydra:
  run:
    dir: outputs/${experiment_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${experiment_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}