# nemg/conf/model/van_de_leur_model.yaml
# FactorECG / van de Leur-style causal dilated beta-VAE settings,
# adapted for the single-channel nEMG experiment folder.

latent_dim: 21
channels: 128
depth: 7
reduced_size: 64
decoder_in_channels: 64
kernel_size: 5
softplus_eps: 1.0e-2
dropout: 0.0
gaussian_out: true
beta: 32.0
beta_warmup_epochs: 10
recon_loss_type: fdd
lambda_fdd: 1.0